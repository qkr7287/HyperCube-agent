services:
  agent:
    build: .
    restart: unless-stopped
    env_file: .env
    # Host network: agent acts as a host-level monitor, and same-host backend
    # registrations record the real LAN IP rather than a docker bridge IP.
    network_mode: host
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /var/run/utmp:/var/run/utmp:ro
      - /etc/hostname:/host/etc/hostname:ro
    group_add:
      - "${DOCKER_GID:-999}"
    # Cap json-file growth at 20MB x 10 = 200MB per container. Without this
    # the log grows unbounded over the agent's long lifetime.
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
